<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/activation.css">
    <link rel="stylesheet" href="css/handoff.css">

<body>
    <div class="presentation-wrapper">
        <div class="device-frame">

            <div class="app-bg-gradient"></div>

            <div class="app-container activation-container">

                        <i class="ph-fill ph-wifi-high"></i>
                        <i class="ph-fill ph-battery-full"></i>

                </div>

                <!-- Header -->

                    <a href="dashboard.html" class="ac-back-btn" aria-label="Go back">

                    </a>
                </div>

                <!-- Hero Main -->
                <div class="ac-hero">
                    <div class="ac-progress-container">
                        <!-- SVG Circular Progress -->
                        <svg class="ac-progress-svg" width="92" height="92" viewBox="0 0 92 92">
                            <!-- Track -->
                            <circle class="ac-progress-track" cx="46" cy="46" r="42" />
                            <!-- Progress Ring -->
                            <circle class="ac-progress-ring" cx="46" cy="46" r="42" />
                        </svg>
                        <div class="ac-progress-text">
                            <span class="ac-percent">20<span style="font-size: 14px;">%</span></span>
                            <span class="ac-sub-label">1/5 DONE</span>
                        </div>
                    </div>

                    <div class="ac-hero-text">
                        <div class="ac-title-wrap">
                            <span class="ac-overline" style="text-transform: uppercase;">Let's get you set up</span>
                            <h1 class="ac-title">4 steps left</h1>
                        </div>
                        <div class="ac-meta-row">
                            <div class="ac-time-pill">
                                <i class="ph ph-clock"></i>
                                <span>~ 9 min left</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Checklist Body -->
                <div class="ac-checklist-body">
                    <p class="ac-section-heading" style="text-transform: uppercase;">Unlock the full Ontop experience
                    </p>
                    <div class="ac-steps-stack">
                        <!-- Step Card 1 -->
                        <div class="ac-step-card completed">
                            <div class="ac-number-circle">
                                <span>1</span>
                            </div>
                            <div class="ac-card-content">
                                <div class="ac-title-row">
                                    <span class="ac-card-title">Personal details</span>
                                </div>
                                <!-- <p class="ac-card-desc">Add your basic info to get started</p> -->
                                <div class="ac-stats">
                                    <div class="ac-stat-item">
                                        <i class="ph ph-clock"></i>
                                        <span>~2 min</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Step Card 2 -->
                        <div class="ac-step-card active" onclick="window.location.href='dashboard-2.html'">
                            <div class="ac-number-circle">
                                <span>2</span>
                            </div>
                            <div class="ac-card-content">
                                <div class="ac-title-row">
                                    <span class="ac-card-title">Identity verification</span>
                                    <div class="ac-badge">
                                        <span>NEXT</span>
                                    </div>
                                </div>
                                <!-- <p class="ac-card-desc">Have your ID ready, this takes a minute</p> -->
                                <div class="ac-stats">
                                    <div class="ac-stat-item">
                                        <i class="ph ph-clock"></i>
                                        <span>~5 min</span>
                                    </div>
                                </div>
                            </div>
                            <div class="ac-chevron">
                                <i class="ph ph-caret-right"></i>
                            </div>
                        </div>

                        <!-- Step Card 3 -->
                        <div class="ac-step-card disabled">
                            <div class="ac-number-circle"
                                style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">
                                <span>3</span>
                            </div>
                            <div class="ac-card-content">
                                <div class="ac-title-row">
                                    <span class="ac-card-title">Account details</span>
                                </div>
                                <!-- <p class="ac-card-desc">Tell us a bit more to finish your setup</p> -->
                                <div class="ac-stats">
                                    <div class="ac-stat-item">
                                        <i class="ph ph-clock"></i>
                                        <span>~1 min</span>
                                    </div>
                                </div>
                            </div>
                            <div class="ac-chevron">
                                <i class="ph ph-caret-right"></i>
                            </div>
                        </div>

                        <!-- Step Card 4 -->
                        <div class="ac-step-card disabled">
                            <div class="ac-number-circle"
                                style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">
                                <span>4</span>
                            </div>
                            <div class="ac-card-content">
                                <div class="ac-title-row">
                                    <span class="ac-card-title">Add funds to your account</span>
                                </div>
                                <!-- <p class="ac-card-desc">Top up now to keep your balance ready for any transaction.</p> -->
                                <div class="ac-stats">
                                    <div class="ac-stat-item">
                                        <i class="ph ph-clock"></i>
                                        <span>~1 min</span>
                                    </div>
                                </div>
                            </div>
                            <div class="ac-chevron">
                                <i class="ph ph-caret-right"></i>
                            </div>
                        </div>

                        <!-- Step Card 5 -->
                        <div class="ac-step-card disabled">
                            <div class="ac-number-circle"
                                style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">
                                <span>5</span>
                            </div>
                            <div class="ac-card-content">
                                <div class="ac-title-row">
                                    <span class="ac-card-title">Activate your virtual card</span>
                                </div>
                                <!-- <p class="ac-card-desc">Enable your card today to start spending securely online.</p> -->
                                <div class="ac-stats">
                                    <div class="ac-stat-item">
                                        <i class="ph ph-clock"></i>
                                        <span>~2 min</span>
                                    </div>
                                </div>
                            </div>
                            <div class="ac-chevron">
                                <i class="ph ph-caret-right"></i>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/handoff-controls.js"></script>
    <script>
        // ── Animation orchestrator ─────────────────────────────────
        // Plays the activation entrance: progress ring + staggered
        // slide-up of the step cards. Wired to both initial load and
        // the floating Replay pill so it can be re-played cleanly
        // without a full page reload (avoids white flash + caching
        // glitches that made the ring appear to play backwards).
        const ringEl = document.querySelector('.ac-progress-ring');
        const stackEl = document.querySelector('.ac-steps-stack');
        const TARGET_PERCENT = 20;
        const STEP_COUNT = stackEl ? stackEl.children.length : 0;
        const STAGGER_MS = 90;
        const ENTRANCE_DURATION = 700;
        const RING_LEAD_MS = 120;

        function playActivation() {
            if (!ringEl || !stackEl) return;

            // ── Reset everything to the "before animation" state ──
            stackEl.classList.remove('is-in', 'is-settled');

            // Compute ring geometry
            const radius = ringEl.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;
            const targetOffset = circumference - (TARGET_PERCENT / 100) * circumference;

            // Park the ring at "empty" without animating into it
            ringEl.style.transition = 'none';
            ringEl.style.strokeDasharray = `${circumference} ${circumference}`;
            ringEl.style.strokeDashoffset = circumference;

            // Force reflow so the empty state is committed before we
            // re-enable the transition. Without this, the browser may
            // batch both writes and skip straight to the target value
            // — or worse, animate from a stale value (the bug we saw
            // on replay where the ring appeared to drain backwards).
            void ringEl.getBoundingClientRect();

            requestAnimationFrame(() => {
                // Restore the CSS-defined transition and animate to 20%
                ringEl.style.transition = '';
                ringEl.style.strokeDashoffset = targetOffset;

                // Cards cascade in slightly after the ring starts moving
                setTimeout(() => stackEl.classList.add('is-in'), RING_LEAD_MS);

                // Once all cards finished sliding in, switch to fast
                // hover-friendly transitions so interactivity feels snappy.
                const settledAt = RING_LEAD_MS + (STEP_COUNT - 1) * STAGGER_MS + ENTRANCE_DURATION;
                setTimeout(() => stackEl.classList.add('is-settled'), settledAt);
            });
        }

        document.addEventListener('DOMContentLoaded', playActivation);

        // The floating Replay pill checks for this hook before falling
        // back to a full page reload.
        window.__hfReplay = playActivation;
    </script>
</body>

</html>
